name: Update Centres Data

on:
  schedule:
    # Runs every 24 hours at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Fetch and update centres data
        run: bun run scripts/fetch-centres.ts

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/centres.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update centres data [skip ci]"
          git push
